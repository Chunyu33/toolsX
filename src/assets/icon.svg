<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 背景渐变：浅绿色，与品牌色协调 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a3e635"/>
      <stop offset="35%" style="stop-color:#86efac"/>
      <stop offset="70%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>

    <!-- 图标渐变：白色到浅绿 -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0fdf4"/>
    </linearGradient>

    <!-- 扳手透明区域遮罩 -->
    <mask id="wrenchMask">
      <rect width="512" height="512" fill="white"/>
      <!-- 扳手头部内圆孔（螺栓位置） -->
      <circle cx="256" cy="205" r="30" fill="black"/>
      <!-- 底部开口（钳口） -->
      <rect x="246" y="230" width="20" height="42" rx="10" fill="black"/>
    </mask>
  </defs>

  <!-- 圆角方形背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- 扳手图标 -->
  <g mask="url(#wrenchMask)">
    <!-- 扳手头部外圆 -->
    <circle cx="256" cy="205" r="62" fill="url(#iconGrad)"/>

    <!-- 手柄（从头部下方延伸） -->
    <rect x="236" y="250" width="40" height="160" rx="20" fill="url(#iconGrad)"/>

    <!-- 手柄防滑纹路 -->
    <rect x="240" y="270" width="32" height="10" rx="5" fill="rgba(34,197,94,0.18)"/>
    <rect x="240" y="292" width="32" height="10" rx="5" fill="rgba(34,197,94,0.18)"/>
    <rect x="240" y="314" width="32" height="10" rx="5" fill="rgba(34,197,94,0.18)"/>
  </g>
</svg>
